name: Update PEP Data

on:
  # 毎週金曜日 12:00 PM UTC (日本時間 21:00)
  schedule:
    - cron: '0 12 * * 5'

  # 手動実行を許可
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (test mode - no commit/push)'
        required: true
        type: boolean
        default: false
      model:
        description: 'LLM model for group profile generation (empty = auto select based on dry_run)'
        required: false
        type: choice
        options:
          - ''
          - gpt-5.4
          - gpt-4o
          - gpt-4o-mini
        default: ''

jobs:
  update-data:
    name: Fetch and Update PEP Data
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write  # git pushのために必要

    # schedule実行時はmainブランチで実行（GitHub Actionsの仕様上デフォルトブランチでのみ実行される）
    # 手動実行時はdry_runモードまたはmainブランチで実行
    if: |
      (github.event_name == 'schedule' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.dry_run == 'true' || github.ref == 'refs/heads/main'))

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          # dry_runモードでは現在のブランチ、本番ではproduction
          ref: ${{ github.event.inputs.dry_run == 'true' && github.ref || 'production' }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Set up Takumi Guard for PyPI
        uses: flatt-security/setup-takumi-guard-pypi@v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch PEP data
        id: fetch
        # continue-on-error を使って終了コード2でも継続
        continue-on-error: true
        run: |
          set +e
          PYTHONPATH=. python scripts/fetch_peps.py
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Check fetch status
        run: |
          echo "Fetch exit code: ${{ steps.fetch.outputs.exit_code }}"
          if [ "${{ steps.fetch.outputs.exit_code }}" = "1" ]; then
            echo "Error occurred during fetch"
            exit 1
          fi

      - name: Calculate node metrics
        # 終了コード2（変更あり）の時だけ実行
        if: steps.fetch.outputs.exit_code == '2'
        run: PYTHONPATH=. python scripts/calculate_metrics.py

      - name: Detect communities
        # 終了コード2（変更あり）の時だけ実行
        if: steps.fetch.outputs.exit_code == '2'
        run: PYTHONPATH=. python scripts/detect_communities.py

      - name: Generate group profiles
        # 終了コード2（変更あり）の時だけ実行
        if: steps.fetch.outputs.exit_code == '2'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_TRACING_V2: true
          LANGCHAIN_PROJECT: pep-map
        run: |
          # モデル選択: inputs.model が指定されていればそれを使用、
          # 未指定の場合は dry_run に応じて自動選択
          if [ -n "${{ github.event.inputs.model }}" ]; then
            MODEL="${{ github.event.inputs.model }}"
          elif [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            MODEL="gpt-4o-mini"
          else
            MODEL="gpt-5.4"
          fi
          echo "Using model: $MODEL"
          PYTHONPATH=. python scripts/generate_group_profiles.py --model "$MODEL"

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet data/processed/; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected in data/processed/"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected in data/processed/"
            git diff data/processed/
          fi

      - name: Dry run summary
        if: github.event.inputs.dry_run == 'true'
        run: |
          echo "🔍 DRY RUN MODE - No changes will be committed"
          echo "Branch: ${{ github.ref }}"
          echo "Fetch exit code: ${{ steps.fetch.outputs.exit_code }}"
          echo "Changes detected: ${{ steps.check_changes.outputs.changed }}"

      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A data/processed/

          # コミットメッセージを exit_code に応じて変更
          if [ "${{ steps.fetch.outputs.exit_code }}" = "2" ]; then
            # データ変更あり
            if [ "${{ github.event_name }}" = "schedule" ]; then
              git commit -m "Update PEP data and metrics (automated weekly update)"
            else
              git commit -m "Update PEP data and metrics (manual update)"
            fi
          else
            # メタデータのみ更新（checked_at）
            if [ "${{ github.event_name }}" = "schedule" ]; then
              git commit -m "Update data check timestamp (no changes, automated weekly check)"
            else
              git commit -m "Update data check timestamp (no changes, manual check)"
            fi
          fi

          git push origin production

      - name: No changes to commit
        if: steps.check_changes.outputs.changed == 'false'
        run: echo "✅ No file changes detected. Skipping commit."
